# tenant.yaml — tenant CLI deployment.
#
# В MVP tenant = CLI внутри pod, не persistent workload.
# В Phase 2 это станет полноценным tenant gateway (gRPC reverse proxy +
# RBAC + billing). В Phase 1 — просто CLI shell для exec.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-acme-corp
  labels:
    app.kubernetes.io/name: tenant
    app.kubernetes.io/component: tenant
    tenant.acme.io/name: acme-corp
spec:
  replicas: 1
  selector:
    matchLabels:
      tenant.acme.io/name: acme-corp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant
        tenant.acme.io/name: acme-corp
    spec:
      serviceAccountName: etronium-tenant
      containers:
        - name: tenant-cli
          image: etronium-mvp:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          env:
            - name: ETRONIUM_SCHEDULER
              value: "etronium-frontend.etronium-mvp.svc:51061"
            - name: ETRONIUM_TENANT
              value: "acme-corp"
