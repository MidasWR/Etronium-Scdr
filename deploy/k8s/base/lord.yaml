# lord.yaml — StatefulSet для lord-providers.
#
# Каждый lord = отдельный resource provider с собственными ресурсами.
# StatefulSet потому что у каждого lord уникальный hostname (lord-school-A
# vs lord-edge-X vs lord-iot-Y). В Phase 1 — 3 replicas, в overlays —
# 5 (Phase A heterogeneous topology).
#
# Phase 1 без cyber — каждый privileged для cgroup/cgroups.
# Phase 3+ — Drop ALL capabilities + add только нужные.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lord
  labels:
    app.kubernetes.io/name: lord
    app.kubernetes.io/component: provider
spec:
  serviceName: lord
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: lord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lord
        app.kubernetes.io/component: provider
    spec:
      serviceAccountName: etronium-lord
      containers:
        - name: lord
          image: etronium-mvp:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # LORD_INDEX env var from StatefulSet ordinal.
              # Map ordinal → hostname + resources (heterogeneous).
              case "$$LORD_INDEX" in
                0) H=lord-school-A; CPU=3200; MEM=4294967296 ;;
                1) H=lord-school-B; CPU=1600; MEM=2147483648 ;;
                2) H=lord-school-C; CPU=2400; MEM=3221225472 ;;
              esac
              exec lord \
                --scheduler=etronium-frontend.etronium-mvp.svc:51061 \
                --hostname=$$H \
                --advertise-cpu=$$CPU \
                --advertise-mem=$$MEM \
                --log=info
          env:
            - name: LORD_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['statefulset.kubernetes.io/pod-name']
                  # Will be patched by ordinal via downward API below.
            - name: POD_ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
          ports:
            - name: grpc
              containerPort: 51061
              protocol: TCP
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
            - name: state
              mountPath: /tmp/etronium/state
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
---
# Service для headless DNS resolution — lords находят frontend через DNS имя.
apiVersion: v1
kind: Service
metadata:
  name: lord
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: lord
  ports:
    - name: grpc
      port: 51061