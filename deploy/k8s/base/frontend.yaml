# frontend.yaml — Etronium scheduler/frontend deployment.
#
# Stateful front-end: держит gRPC server, tenant registry, lord connections,
# recovery logic, WAL persistence. На "проде" — 1 replica (single-leader)
# либо 3 для HA через RWO PVC + leader election (Phase 3+).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: scheduler
spec:
  # Phase 1: 1 replica — single-leader WAL persistence.
  # Phase 3+: 3 replicas с leader election через etcd/redis.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: etronium-frontend
      # Phase 1 без cyber — privileged для cgroup operations.
      # Phase 3+ заменить на specific CAP_SYS_ADMIN + drop остальное.
      containers:
        - name: frontend
          image: etronium-mvp:latest
          imagePullPolicy: IfNotPresent
          command: ["scheduler", "--addr=:51061", "--log=info"]
          envFrom:
            - configMapRef:
                name: etronium-config
                optional: false
          ports:
            - name: grpc
              containerPort: 51061
              protocol: TCP
          # Phase B — cgroup v2 для tenant isolation
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
            - name: wal
              mountPath: /tmp/etronium
            - name: state
              mountPath: /tmp/etronium/state
          # Liveness/readiness — без cyber/probes через gRPC health check.
          # Phase 3+ — добавить настоящие grpc-health-probe.
          readinessProbe:
            exec:
              command: ["sh", "-c", "ss -tln | grep -q ':51061' || exit 1"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            # Минимальные для k3s/dev кластера.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: wal
          # ReadWriteOnce PVC — Phase 3+ перейти на distributed WAL (etcd).
        - name: state
          # Shared state для lord-ов (для cross-lord stateful migration).
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  # Phase 1: LoadBalancer — для external tenant access.
  # В k3s single-node использует localhost NodePort.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: grpc
      port: 51061
      targetPort: 51061
      protocol: TCP