apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay — для minikube/k3s single-node testing.
# replicas=1 для всех, локальные images, debug env.
#
# Apply: kubectl apply -k deploy/k8s/overlays/dev
namespace: etronium-mvp-dev

resources:
  - ../../base

namePrefix: dev-

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SCHEDULER_LOG_LEVEL
          value: debug
  - target:
      kind: StatefulSet
      name: lord
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

images:
  - name: etronium-mvp
    newName: etronium-mvp
    newTag: dev