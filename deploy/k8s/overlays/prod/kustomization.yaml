apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-like overlay — multi-node "почти-прод" deploy.
# Больше replicas, реальные PVC storage class, LoadBalancer service.
#
# Apply: kubectl apply -k deploy/k8s/overlays/prod
namespace: etronium-mvp

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/resources/limits
        value:
          cpu: 2000m
          memory: 2Gi
  - target:
      kind: StatefulSet
      name: lord
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
      - op: add
        path: /spec/template/spec/containers/0/resources/limits
        value:
          cpu: 1000m
          memory: 1Gi

images:
  - name: etronium-mvp
    newName: etronium/mvp
    newTag: v0.1.0