# docker-compose.mvp.yml — Etronium MVP testbed для "почти-прод" e2e demo.
#
# Topology:
#   1× frontend    (stateful front-end — наша "VPS" side)
#   5× lord        (heterogeneous compute providers — школы, ноутбуки, edge)
#   2× tenant      (B2B клиенты — acme-corp и acme-edu; изолированы друг от друга)
#
# Цель этой версии: можно грубо использовать в проде — есть persistence,
# multi-tenant, heterogeneous lords, cgroup isolation per-tenant.
# НЕТ: cyber-security hardening, mTLS, RBAC, OPA, sidecar mesh, observability
# stack (Prometheus/Grafana), autoscaler, k8s operator. Это всё Phase 3+.
#
# Phase A: 5 lords (school-A/B/C + edge-X/Y)
# Phase D: 2 tenants в одном testbed, проверяем cross-tenant isolation
#
# Usage:
#   docker compose -f test/mvp/docker-compose.yml up -d
#   docker compose -f test/mvp/docker-compose.yml down
#
# Tenant commands:
#   ./bin/etronium --scheduler=127.0.0.1:51061 --tenant=acme-corp process spawn --exec=/bin/sleep --arg=300
#   ./bin/etronium --scheduler=127.0.0.1:51061 --tenant=acme-corp process list
#   ./bin/etronium --scheduler=127.0.0.1:51061 --tenant=acme-corp lords
#
#   ./bin/etronium --scheduler=127.0.0.1:51061 --tenant=acme-edu  process list
#   (только acme-edu процессы, не acme-corp)

services:
  frontend:
    image: etronium-mvp:runtime
    container_name: mvp-frontend
    network_mode: host
    privileged: true
    command:
      - scheduler
      - --addr=:51061
      - --log=info
    environment:
      - SCHEDULER_HEARTBEAT_TTL=30s
      - SCHEDULER_PLACEMENT=weighted
      - SCHEDULER_WAL_PATH=/tmp/etronium/frontend.wal
      - SCHEDULER_RECOVERY_DEBOUNCE=10s
      # Phase B — cgroup isolation per-tenant
      - SCHEDULER_CGROUP_ROOT=/sys/fs/cgroup/etronium
      - SCHEDULER_ENABLE_CGROUP=true
      # Phase 3.3 — bpftool for BPF map updates on lord register
    volumes:
      - etronium-data:/tmp/etronium
      # Phase B — mount cgroup v2 hierarchy для cgroup weight per-tenant
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # Phase 3.3 — mount bpffs so scheduler (cilium/ebpf) can write lord BPF maps
      - /sys/fs/bpf:/sys/fs/bpf
    restart: unless-stopped

  # Phase A — 5 lords с разными ресурсами (heterogeneous compute).
  # Hostnames отражают "реальные" источники: школьные ноуты, edge boxes.
  lord-01:
    image: etronium-mvp:runtime
    container_name: mvp-lord-01
    network_mode: host
    privileged: true
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:51061
      - --hostname=lord-school-A
      - --advertise-cpu=3200
      - --advertise-mem=4294967296
      - --log=info
    volumes:
      - etronium-data:/tmp/etronium
    depends_on:
      - frontend
    restart: unless-stopped

  lord-02:
    image: etronium-mvp:runtime
    container_name: mvp-lord-02
    network_mode: host
    privileged: true
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:51061
      - --hostname=lord-school-B
      - --advertise-cpu=1600
      - --advertise-mem=2147483648
      - --log=info
    volumes:
      - etronium-data:/tmp/etronium
    depends_on:
      - frontend
    restart: unless-stopped

  lord-03:
    image: etronium-mvp:runtime
    container_name: mvp-lord-03
    network_mode: host
    privileged: true
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:51061
      - --hostname=lord-school-C
      - --advertise-cpu=2400
      - --advertise-mem=3221225472
      - --log=info
    volumes:
      - etronium-data:/tmp/etronium
    depends_on:
      - frontend
    restart: unless-stopped

  # Новые lords — edge/enterprise профили для Phase A гетерогенности
  lord-04:
    image: etronium-mvp:runtime
    container_name: mvp-lord-04
    network_mode: host
    privileged: true
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:51061
      - --hostname=lord-edge-X
      - --advertise-cpu=8000       # мощный edge
      - --advertise-mem=8589934592 # 8GB
      - --log=info
    volumes:
      - etronium-data:/tmp/etronium
    depends_on:
      - frontend
    restart: unless-stopped

  lord-05:
    image: etronium-mvp:runtime
    container_name: mvp-lord-05
    network_mode: host
    privileged: true
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:51061
      - --hostname=lord-iot-Y
      - --advertise-cpu=800        # слабый IoT
      - --advertise-mem=536870912  # 512MB
      - --log=info
    volumes:
      - etronium-data:/tmp/etronium
    depends_on:
      - frontend
    restart: unless-stopped

  # Phase D — 2 tenant'а, изолированы по tenant_id в scheduler.
  # Tenant только CLI-окружение, не persistent. host networking чтобы
  # CLI мог достучаться до :51061 с хоста.

  # Phase BPF — schedulerd daemon загружает etronium BPF scheduler в kernel
  # через bpftool. Host PID/IPC mount для доступа к /sys/kernel/sched_ext.
  schedulerd:
    image: etronium-mvp:runtime
    container_name: mvp-schedulerd
    network_mode: host
    privileged: true
    pid: host
    ipc: host
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug
      - /boot:/boot:ro
      # Bind host bpftool DIRECTLY (the binary itself, not the wrapper script)
      # — uses HOST kernel version matching for libbpf feature detection.
      - /usr/lib/linux-tools/7.0.0-28-generic/bpftool:/usr/local/bin/etronium-bpftool:ro
      # Host libbpf (1.7) for struct_ops operations.
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
    command:
      - schedulerd
      - --bpf-obj=/opt/etronium/bpf/sched_ext_final.o
      - --bpftool=/usr/local/bin/etronium-bpftool
      - --link-dir=/sys/fs/bpf/etronium/sched
    restart: unless-stopped

  tenant-acme-corp:
    image: etronium-mvp:runtime
    container_name: mvp-tenant-corp
    network_mode: host
    command: ["sleep", "infinity"]
    volumes:
      - etronium-data:/tmp/etronium
    restart: unless-stopped

  tenant-acme-edu:
    image: etronium-mvp:runtime
    container_name: mvp-tenant-edu
    network_mode: host
    command: ["sleep", "infinity"]
    volumes:
      - etronium-data:/tmp/etronium
    restart: unless-stopped

volumes:
  etronium-data:
    name: etronium-mvp-data

