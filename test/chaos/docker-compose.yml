# docker-compose.chaos.yml — chaos testbed для Etronium.
#
# Topology:
#   1× scheduler          (etronium gRPC :50051)
#   3× lord-active-{1..3} (advertise cpu+ram, сразу подключены)
#   3× lord-queued-{4..6} (НЕ стартуют сразу, поднимаются из chaos-runner)
#   1× tenant             (etronium CLI + load generators)
#   1× k3s                (sidecar: 50 nginx pods — "k8s в кластере Etronium")
#   1× chaos              (orchestrator: docker socket, прогоняет сценарии)
#
# Все контейнеры в одной bridge network, плюс host network для gRPC
# (50051 на хосте). Shared volume /tmp/etronium для state.

version: "3.9"

networks:
  etronium:
    driver: bridge

volumes:
  etronium-state:
  docker-sock:

services:
  scheduler:
    image: etronium-test:runtime
    container_name: etronium-scheduler
    network_mode: host
    privileged: true
    cgroupns: private
    command:
      - scheduler
      - --addr=:50051
      - --log=info
      - --log-format=json
    environment:
      - SCHEDULER_HEARTBEAT_TTL=20s
      - SCHEDULER_PLACEMENT=weighted
      - SCHEDULER_WAL_PATH=/tmp/etronium/scheduler.wal
    volumes:
      - etronium-state:/tmp/etronium
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:50051 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  lord-active-1:
    image: etronium-test:runtime
    container_name: etronium-lord-active-1
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:50051
      - --advertise-cpu=3200
      - --advertise-mem=4294967296
      - --log=info
      - --log-format=json
    volumes:
      - etronium-state:/tmp/etronium
    depends_on:
      scheduler:
        condition: service_healthy

  lord-active-2:
    image: etronium-test:runtime
    container_name: etronium-lord-active-2
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:50051
      - --advertise-cpu=3200
      - --advertise-mem=4294967296
      - --log=info
      - --log-format=json
    volumes:
      - etronium-state:/tmp/etronium
    depends_on:
      scheduler:
        condition: service_healthy

  lord-active-3:
    image: etronium-test:runtime
    container_name: etronium-lord-active-3
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:50051
      - --advertise-cpu=3200
      - --advertise-mem=4294967296
      - --log=info
      - --log-format=json
    volumes:
      - etronium-state:/tmp/etronium
    depends_on:
      scheduler:
        condition: service_healthy

  # Queued lords — стартуют по запросу chaos-runner'а.
  lord-queued-4:
    image: etronium-test:runtime
    container_name: etronium-lord-queued-4
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command:
      - lord
      - --scheduler=127.0.0.1:50051
      - --advertise-cpu=3200
      - --advertise-mem=4294967296
      - --log=info
      - --log-format=json
    volumes:
      - etronium-state:/tmp/etronium
    entrypoint: ["sleep", "infinity"]  # не стартует lord пока chaos не сделает docker start с переопределением команды
    profiles: ["queued"]

  lord-queued-5:
    image: etronium-test:runtime
    container_name: etronium-lord-queued-5
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command: ["sleep", "infinity"]
    volumes:
      - etronium-state:/tmp/etronium
    profiles: ["queued"]

  lord-queued-6:
    image: etronium-test:runtime
    container_name: etronium-lord-queued-6
    network_mode: host
    privileged: true
    cgroupns: private
    tmpfs: /tmp
    command: ["sleep", "infinity"]
    volumes:
      - etronium-state:/tmp/etronium
    profiles: ["queued"]

  tenant:
    image: etronium-test:runtime
    container_name: etronium-tenant
    network_mode: host
    command: ["sleep", "infinity"]
    volumes:
      - etronium-state:/tmp/etronium

  # K3s sidecar — внутри него запускаем "k8s-like" workload (50 nginx pods).
  # Это показывает что Etronium уживается с K8s на одной машине.
  k3s:
    image: rancher/k3s:v1.30.4-k3s1
    container_name: etronium-k3s
    privileged: true
    command:
      - server
      - --disable=traefik,servicelb,metrics-server,local-storage
      - --write-kubeconfig-mode=0644
      - --kube-apiserver-arg=service-node-port-range=30000-30100
    volumes:
      - etronium-state:/tmp/etronium
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    tmpfs:
      - /run
      - /var/run
    networks:
      etronium:
        ipv4_address: 172.30.0.20

  chaos:
    image: etronium-test:runtime
    container_name: etronium-chaos
    network_mode: host
    privileged: true
    command:
      - chaos-runner
    volumes:
      - etronium-state:/tmp/etronium
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - scheduler
      - tenant