// =====================================================================
//  Etronium-Scdr — gRPC API contract (v2)
//
//  Класс задачи: MOSIX-style Single System Image (SSI) поверх Linux,
//  реализованный в user-space через имитацию NUMA-архитектуры на
//  распределённых машинах.
//
//  Аналогия:
//    Scheduler = центральный планировщик ресурсов (NUMA scheduler)
//    Lord      = "ядро" с локальной памятью и исполнительными блоками
//    Process   = "нить" в терминологии NUMA
//
//  Ключевые отличия от task-queue подхода:
//    • Гранулярность — процесс, не задача
//    • Глобальный view у scheduler'а, локальный у lord'а
//    • Миграция — first-class операция (CRIU + reconnect)
//    • "Обман" Linux: lord выглядит для ядра так, будто у него есть
//      ресурсы, которых на самом деле нет; при обращении к ним данные
//      идут по сети
//
//  Документация-OpenAPI генерируется из этого proto через grpc-gateway
//  annotations, см. docs/openapi/. Runtime gateway не поднимаем —
//  OpenAPI используется только как документация.
// =====================================================================

syntax = "proto3";

package etronium.v1;

option go_package = "github.com/midas/Etronium-Scdr/internal/gen/etronium/v1;etroniumv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// =====================================================================
//  OpenAPI метаданные
// =====================================================================

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Etronium-Scdr API"
    version: "v2"
    description: "MOSIX-class Single System Image over Linux user-space. Scheduler as NUMA scheduler, lords as cores, processes as threads."
    contact: { name: "Etronium-Scdr" }
  }
  schemes: HTTPS
};

// =====================================================================
//  Common — базовые типы
// =====================================================================

// Состояние процесса (POSIX-подобная FSM, не OCI task FSM).
//
// Полная диаграмма:
//   NEW ──► READY ──► RUNNING ──► EXITED
//                │         │
//                │         ├──► PAUSED ──► RUNNING
//                │         │
//                │         ├──► MIGRATING ──► RUNNING (на другом lord'е)
//                │         │
//                │         └──► STOPPED (killed by signal)
//
// READY = создан и стоит в очереди планировщика на запуск
// RUNNING = исполняется на каком-то lord'е
// PAUSED = freeze (cgroup.freeze=1, SIGSTOP)
// MIGRATING = в процессе переезда на другой lord (CRIU dump/restore)
// EXITED = завершился нормально (exit_code != null)
// STOPPED = убит сигналом
enum ProcessState {
  PROCESS_STATE_UNSPECIFIED = 0;
  PROCESS_STATE_NEW      = 1;  // создан в scheduler'е, ещё не запущен
  PROCESS_STATE_READY    = 2;  // ожидает placement / запуска
  PROCESS_STATE_RUNNING  = 3;  // исполняется
  PROCESS_STATE_PAUSED   = 4;  // заморожен (SIGSTOP + cgroup.freeze)
  PROCESS_STATE_MIGRATING = 5; // в процессе миграции (CRIU)
  PROCESS_STATE_EXITED   = 6;  // завершился нормально
  PROCESS_STATE_STOPPED  = 7;  // убит сигналом
  // Phase 3.4: lord умер во время выполнения процесса, планировщик
  // сейчас занимается респауном на здоровом lord'е. Этот статус
  // видим tenant'у как RESTARTING — короткоживущий.
  PROCESS_STATE_RESTARTING = 8;
}

// Ресурсы процесса. Два уровня:
//
//   local_capacity  — физически на lord'е, реальный лимит cgroup
//   advertised_capacity — что scheduler показывает тенанту, может
//                          быть больше чем физическое (NUMA-overcommit)
//
// Принцип: lord видит только local_capacity, scheduler знает обе.
// Когда процесс упирается в local_capacity — scheduler мигрирует
// или сжимает с других tenant'ов на этом lord'е.
message ResourceSpec {
  int32 cpu_shares  = 1;  // относительный вес (cgroup cpu.weight), default 100
  int32 cpu_quota_pct = 2; // жёсткий лимит в % от ядра, 0 = без лимита (только weight)
  int64 mem_limit_bytes = 3; // жёсткий лимит RAM, 0 = без лимита
  int32 io_weight   = 4;  // blkio weight, default 100
  int32 pids_limit  = 5;  // max кол-во процессов/тредов
}

// Идентификация процесса в SSI.
//
// Глобально процесс адресуется через (lord_id, local_pid) ИЛИ
// через process_id (ULID), если мигрировал между lord'ами —
// process_id остаётся стабильным, local_pid меняется.
message ProcessRef {
  string process_id = 1;  // глобальный стабильный ID (ULID)
  string lord_id    = 2;  // текущий lord, "" если не RUNNING
  int32  local_pid  = 3;  // PID внутри lord'а, 0 если не RUNNING
}

// Информация о лорде — "ядре" в NUMA-аналогии.
message Lord {
  string lord_id = 1;  // ULID
  string hostname = 2;
  string os   = 3;  // "linux"
  string arch = 4;  // "amd64"
  // Реальные физические ресурсы lord'а (то что есть на машине).
  int32 cpu_cores_physical = 5;
  int64 mem_total_bytes_physical = 6;
  // NUMA-overcommit (Phase 2): scheduler может сказать kernel'у lord'а
  // что ресурсов больше чем физически. Kernel всё равно будет использовать
  // только local_capacity, но scheduler знает про overcommit и может
  // мигрировать процессы когда нужно.
  int32 advertised_cpu_shares = 14;   // если 0 = нет overcommit (= cpu_cores_physical * 100)
  int64 advertised_mem_bytes = 15;    // если 0 = нет overcommit (= mem_total_bytes_physical)
  // Текущая утилизация.
  int32 cpu_used_pct = 7;
  int64 mem_used_bytes = 8;
  int32 active_processes = 9;
  // Health
  bool healthy = 10;
  double reputation = 11;  // 0.0..1.0
  google.protobuf.Timestamp last_seen = 12;
}

// Snapshot процесса — выдаётся через GetProcess/ListProcesses.
message ProcessInfo {
  ProcessRef ref = 1;
  string tenant_id = 2;          // кто владелец (тенант/арендатор)
  string parent_ref = 3;         // process_id родителя, "" если init этого тенанта
  // exec
  string exec_path = 4;          // бинарник
  repeated string argv = 5;      // аргументы
  map<string, string> env = 6;
  string working_dir = 17;      // cwd процесса
  // current state
  ProcessState state = 7;
  google.protobuf.Timestamp state_changed_at = 8;
  // запрошенные ресурсы (реальные лимиты см. в ProcessRef.LordId через lord API)
  ResourceSpec resources = 16;
  // resource usage за всё время
  int64 cpu_usage_usec_total = 9;
  int64 mem_current_bytes = 10;
  int64 mem_peak_bytes = 11;
  int32 num_threads = 12;
  // exit info (если state in {EXITED, STOPPED})
  google.protobuf.Timestamp exited_at = 13;
  int32 exit_code = 14;          // -1 если killed by signal
  int32 exit_signal = 15;        // 0 если normal exit

  // Phase 3.4: fault tolerance counters. restart_count is the number
  // of times this process was respawned because its lord died. V5
  // opt-in state-serialized processes can recover from latest snapshot.
  int32 restart_count = 18;
  string last_error = 19;        // human-readable; set on last respawn failure
  // Path to last-known application state dump (V5). Empty if process
  // does not opt in to periodic state serialization.
  string state_dump_path = 20;
  // Max allowed restart count before scheduler gives up and finalizes.
  int32 max_restarts = 21;       // 0 = default (10), -1 = unlimited
  // Optional wall-clock deadline after which restarts are denied.
  google.protobuf.Timestamp deadline_at = 22;
}

// Событие процесса для WatchProcess stream.
message ProcessEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_STATE_CHANGED = 1;
    EVENT_TYPE_SIGNAL_RECEIVED = 2;
    EVENT_TYPE_CHILD_SPAWNED = 3;
    EVENT_TYPE_IO_THRESHOLD = 4;  // crossed CPU/MEM threshold
    EVENT_TYPE_MIGRATION_COMPLETE = 5;
  }
  ProcessRef ref = 1;
  EventType type = 2;
  google.protobuf.Timestamp at = 3;
  oneof payload {
    ProcessState new_state = 4;
    int32 signal_number = 5;
    ProcessRef child_ref = 6;
    ResourceUsage usage = 7;
  }
}

message ResourceUsage {
  int64 cpu_usage_usec_delta = 1;
  int64 mem_current_bytes = 2;
  int64 mem_peak_bytes = 3;
  int32 num_threads = 4;
}

// IO chunk — для stdin/stdout/stderr стримов.
message IOChunk {
  enum Stream {
    STREAM_UNSPECIFIED = 0;
    STREAM_STDIN  = 1;
    STREAM_STDOUT = 2;
    STREAM_STDERR = 3;
  }
  Stream stream = 1;
  bytes data = 2;
  int64 offset = 3;  // byte offset от начала (для ordering и resume)
}

// =====================================================================
//  SchedulerService — управление процессами и ресурсами
//
//  Тенант (арендатор) вызывает Spawn/Kill/Wait/Migrate. Ему не нужно
//  знать на каком lord'е живёт процесс — это работа scheduler'а.
//
//  Tenant видит СВОИ процессы на ВСЕХ lord'ах где они сейчас.
//  Scheduler видит ВСЁ (для placement).
// =====================================================================

service SchedulerService {
  // Spawn — создать процесс. Возвращает ProcessInfo с initial state.
  //
  // Scheduler сам выбирает lord (placement), выдаёт process_id (ULID),
  // отдаёт команду на lord. Процесс может быть запущен сразу (если есть
  // ресурсы) или встать в READY.
  rpc Spawn(SpawnRequest) returns (ProcessInfo) {
    option (google.api.http) = {
      post: "/api/v1/processes"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Spawn a new process"
      description: "Создать процесс в SSI. Placement решает scheduler."
      tags: "tenant"
    };
  }

  // Kill — послать сигнал (по умолчанию SIGTERM) процессу.
  //
  // Можно использовать signal_number чтобы послать любой POSIX-сигнал.
  // force=true означает SIGKILL (skip grace period).
  rpc Kill(KillRequest) returns (KillResponse) {
    option (google.api.http) = {
      post: "/api/v1/processes/{process_id}/kill"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send signal to process (default SIGTERM)"
      description: "POSIX-семантика через scheduler. SIGKILL если force=true."
      tags: "tenant"
    };
  }

  // Wait — блокирующий вызов до exit/stop процесса (или timeout).
  //
  // Возвращает ProcessInfo с финальным state (EXITED или STOPPED).
  // Если timeout — возвращает текущий state.
  rpc Wait(WaitRequest) returns (ProcessInfo) {
    option (google.api.http) = {
      post: "/api/v1/processes/{process_id}/wait"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Wait for process exit"
      description: "Блокирует до exit/stop или timeout."
      tags: "tenant"
    };
  }

  // GetProcess — текущее состояние процесса.
  rpc GetProcess(GetProcessRequest) returns (ProcessInfo) {
    option (google.api.http) = {
      get: "/api/v1/processes/{process_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get process state"
      description: "Снимок состояния. Idempotent."
      tags: "tenant"
    };
  }

  // ListProcesses — список процессов тенанта (на ВСЕХ lord'ах где они живут).
  rpc ListProcesses(ListProcessesRequest) returns (ListProcessesResponse) {
    option (google.api.http) = {
      get: "/api/v1/processes"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List tenant processes"
      description: "Глобальный view: процессы тенанта со всех lord'ов. Newest first."
      tags: "tenant"
    };
  }

  // Migrate — переместить процесс на другой lord (или на "лучший" по auto=true).
  //
  // Это first-class операция (в отличие от task-queue подхода, где
  // "переезд" = новый submit). Использует CRIU на обоих lord'ах.
  //
  // Сценарии:
  //   • Memory pressure на текущем lord'е — scheduler инициирует migrate
  //   • Lord уходит в lazy death — миграция активных процессов
  //   • Тенант явно просит перенести процесс на другой lord (affinity)
  rpc Migrate(MigrateRequest) returns (MigrateResponse) {
    option (google.api.http) = {
      post: "/api/v1/processes/{process_id}/migrate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Migrate process to another lord"
      description: "CRIU checkpoint + restore. Активно во время MIGRATING."
      tags: "tenant"
    };
  }

  // ListLords — дамп всех lord'ов (для мониторинга и admin).
  rpc ListLords(ListLordsRequest) returns (ListLordsResponse) {
    option (google.api.http) = {
      get: "/api/v1/lords"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List lords (NUMA cores view)"
      description: "Полный дамп для admin/monitoring."
      tags: "admin"
    };
  }

  // StreamProcessIO — server-stream для stdin/stdout/stderr процесса.
  //
  // Можно подписаться на вывод процесса (live logs), или писать в stdin
  // (через IOChunk со stream=STDIN). Аналог kubectl attach.
  rpc StreamProcessIO(StreamProcessIORequest) returns (stream IOChunk) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Stream process IO (attach)"
      description: "Подключиться к stdin/stdout/stderr живого процесса."
      tags: "tenant"
    };
  }

  // WatchProcess — server-stream событий процесса (state changes, signals, childs).
  rpc WatchProcess(WatchProcessRequest) returns (stream ProcessEvent) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Watch process events"
      description: "Подписка на lifecycle события процесса."
      tags: "tenant"
    };
  }

  // PullFile — забрать файл с lord'а (тенант видит свой процесс на lord'е).
  rpc PullFile(PullFileRequest) returns (PullFileResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Pull file from lord"
      description: "Локальный копи: scheduler координирует передачу файла от lord'а к тенанту."
      tags: "tenant"
    };
  }

  // PushFile — положить файл на lord'а (для нужд процесса).
  rpc PushFile(PushFileRequest) returns (PushFileResponse) {
    option (google.api.http) = {
      post: "/api/v1/processes/{process_id}/files"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Push file to lord"
      description: "Локальный копи: scheduler координирует передачу файла от тенанта к lord'у."
      tags: "tenant"
    };
  }

  // InvalidateFileCache — сказать lord'у забыть локальную копию файла.
  rpc InvalidateFileCache(InvalidateFileCacheRequest) returns (InvalidateFileCacheResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Invalidate file cache on lord"
      description: "Сбросить локальную копию файла на указанном lord'е."
      tags: "tenant"
    };
  }
}

// --- SchedulerService messages ---

message SpawnRequest {
  string tenant_id = 1;  // пока pre-shared per CLI; auth в metadata
  string exec_path = 2;  // абсолютный путь внутри lord'а (например "/usr/bin/python3")
  repeated string argv = 3;  // ["python3", "-c", "print('hi')"]
  map<string, string> env = 4;
  ResourceSpec resources = 5;  // см. ResourceSpec
  string working_dir = 6;     // cwd внутри lord'а, default "/"
  // Опциональные hints для placement. Если пусто — scheduler сам.
  string prefer_lord_id = 7;  // soft-affinity
  // Initial stdin (если есть что-то ввести сразу при старте).
  bytes stdin_initial = 9;
  string process_id = 10;  // глобальный ID, присваивается scheduler'ом
  // Phase 3.4: fault tolerance options. If max_restarts > 0 and the
  // process lives on a lord that dies, scheduler respawns on another
  // lord automatically. If state_dump_path_hint is set, scheduler
  // passes it to the lord which exposes it to the process via
  // $ETRONIUM_STATE_DUMP env var (used by V5 opt-in apps).
  int32 max_restarts = 11;          // 0 = inherit global default (10)
  string state_dump_path_hint = 12; // e.g. "/var/lib/etronium/state/<pid>.json"
}

message KillRequest {
  string process_id = 1;
  int32  signal_number = 2;  // default 15 (SIGTERM)
  bool   force = 3;          // true → SIGKILL, bypass grace
}

message KillResponse {
  bool acknowledged = 1;
  ProcessState current_state = 2;
}

message WaitRequest {
  string process_id = 1;
  int32  timeout_sec = 2;  // 0 = ждать бесконечно, max 600
}

message GetProcessRequest {
  string process_id = 1;
}

message ListProcessesRequest {
  string tenant_id = 1;
  bool   only_running = 2;  // фильтр: только RUNNING/PAUSED
  int32  limit = 3;
  string page_token = 4;
}

message ListProcessesResponse {
  repeated ProcessInfo processes = 1;
  string next_page_token = 2;
}

message MigrateRequest {
  string process_id = 1;
  // Если target_lord_id пустой И auto=true — scheduler выберет лучший.
  string target_lord_id = 2;
  bool   auto = 3;
  string reason = 4;  // human-readable, логируется
}

message MigrateResponse {
  bool acknowledged = 1;
  ProcessState current_state = 2;  // будет MIGRATING потом RUNNING на новом lord'е
  string new_lord_id = 3;
  int32  new_local_pid = 4;
}

message ListLordsRequest {
  bool only_healthy = 1;
}

message ListLordsResponse {
  repeated Lord lords = 1;
}

message StreamProcessIORequest {
  string process_id = 1;
  bool follow = 2;  // если true — с начала, false — с текущего offset
  bool include_stdin = 3;  // тенант может писать в stdin процесса
}

message WatchProcessRequest {
  string process_id = 1;
  repeated ProcessEvent.EventType event_filter = 2;  // пустой = все
}

message PullFileRequest {
  string process_id = 1;  // процесс-владелец файла (для проверки прав)
  string path = 2;        // абсолютный путь внутри lord'а
}

message PullFileResponse {
  bytes data = 1;
  string sha256 = 2;      // для integrity check
}

message PushFileRequest {
  string process_id = 1;
  string path = 2;
  bytes  data = 3;
  uint32 mode = 4;        // unix permissions
}

message PushFileResponse {
  bool ok = 1;
  string sha256 = 2;      // то что реально записалось
}

message InvalidateFileCacheRequest {
  string process_id = 1;
  string path = 2;
}

message InvalidateFileCacheResponse {
  bool ok = 1;
}

// =====================================================================
//  LordService — control plane между scheduler'ом и lord'ами
//
//  Lord'ы сами НЕ управляют процессами тенантов напрямую — только через
//  scheduler. Но scheduler зовёт RPC на lord'е для:
//    • Register / Heartbeat — регистрация и liveness
//    • ExecRemote — выполнить процесс (от имени scheduler'а)
//    • GetStats — текущая утилизация
//    • FileTransfer — pull/push файлов
//    • CRIU dump/restore — для миграции
//    • LazyDeath — лорд объявляет о плановом завершении
// =====================================================================

service LordService {
  // Connect — lord открывает bidi stream к scheduler'у.
  //
  // Lord при старте открывает ОДИН долгоживущий stream. По нему идёт
  // всё: register/heartbeat от lord'а, spawn/kill от scheduler'а, и IO
  // stream от процессов которые scheduler попросил запустить.
  //
  // Модель: lord не публикует gRPC server (за NAT может быть). Scheduler
  // публичный endpoint, lord инициирует соединение.
  rpc Connect(stream LordCmd) returns (stream LordEvent);

  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/lords/register"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Lord registration"
      tags: "lord"
    };
  }

  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {
    option (google.api.http) = {
      post: "/api/v1/lords/{lord_id}/heartbeat"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Lord heartbeat"
      tags: "lord"
    };
  }

  // ExecRemote — scheduler просит lord запустить процесс.
  //
  // Server stream: lord шлёт IOChunk'и (stdout/stderr) по мере
  // появления + финальный ProcessInfo в конце (закрывает stream).
  rpc ExecRemote(ExecRemoteRequest) returns (stream IOChunk) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Execute process on lord"
      description: "Scheduler инициирует. Lord стримит IO до завершения процесса."
      tags: "lord"
    };
  }

  // KillRemote — scheduler просит lord убить процесс на нём.
  rpc KillRemote(KillRemoteRequest) returns (KillRemoteResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Kill process on lord"
      tags: "lord"
    };
  }

  // StatsRemote — текущие метрики lord'а (для placement).
  rpc StatsRemote(StatsRemoteRequest) returns (Lord) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get lord stats"
      tags: "lord"
    };
  }

  // FilePull / FilePush — для тенантских файлов.
  rpc FilePull(FilePullRequest) returns (FilePullResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Lord pulls file from remote (scheduler or another lord)"
      tags: "lord"
    };
  }

  rpc FilePush(FilePushRequest) returns (FilePushResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Lord receives file"
      tags: "lord"
    };
  }

  // Live migration (CRIU) was abandoned in Phase 3.4 in favour of
  // respawn-on-lord-disconnect (see internal/scheduler/recovery.go).
  // See docs/DECISIONS.md ADR 028-029.

  // LazyDeath — лорд объявляет о плановом завершении.
  rpc AcknowledgeLazyDeath(AcknowledgeLazyDeathRequest) returns (AcknowledgeLazyDeathResponse) {
    option (google.api.http) = {
      post: "/api/v1/lords/{lord_id}/lazy-death"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Acknowledge lazy death"
      tags: "lord"
    };
  }
}

// --- LordService messages ---

message RegisterRequest {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  int32 cpu_cores_physical = 4;
  int64 mem_total_bytes_physical = 5;
  string auth_token = 6;         // pre-shared token
  // NUMA-overcommit (Phase 2). 0 = не задан (advertised == physical).
  int32 advertised_cpu_shares = 9;
  int64 advertised_mem_bytes = 10;
}

message RegisterResponse {
  string lord_id = 1;            // ULID, присвоенный scheduler'ом
  int32 heartbeat_interval_sec = 2;  // рекомендуемый интервал
  string etronium_shared_secret = 3;  // shared key для auth между lord и scheduler
}

message HeartbeatRequest {
  string lord_id = 1;
  // Текущая утилизация (не cumulative — snapshot).
  int32 cpu_used_pct = 2;
  int64 mem_used_bytes = 3;
  int32 active_processes = 4;
}

message HeartbeatResponse {
  bool ack = 1;
  int32 next_heartbeat_sec = 2;
  bool drain = 3;  // true → начать lazy death
  // Pending commands от scheduler'а (например "drain this", "reload config").
  repeated string pending_commands = 4;
}

message ExecRemoteRequest {
  string process_id = 1;     // глобальный ID от scheduler'а
  string tenant_id = 2;
  string exec_path = 3;
  repeated string argv = 4;
  map<string, string> env = 5;
  ResourceSpec resources = 6;
  string working_dir = 7;
  bytes stdin_initial = 8;
}

message KillRemoteRequest {
  string process_id = 1;
  int32 signal_number = 2;
  bool force = 3;
}

message KillRemoteResponse {
  bool ok = 1;
}

message StatsRemoteRequest {
  string lord_id = 1;
}

message FilePullRequest {
  string path = 1;
  uint64 offset = 2;
  uint64 size = 3;  // 0 = до конца
}

message FilePullResponse {
  bytes data = 1;
  string sha256 = 2;
}

message FilePushRequest {
  string path = 1;
  bytes data = 2;
  uint32 mode = 3;
}

message FilePushResponse {
  bool ok = 1;
  string sha256 = 2;
}



// LordCmd — то что lord шлёт scheduler'у в Connect stream.
message LordCmd {
  oneof cmd {
    RegisterRequest register = 1;       // первый message после открытия stream
    HeartbeatRequest heartbeat = 2;     // каждые 10s
    ProcessStarted started = 3;         // процесс запущен (с local_pid)
    ProcessIo io = 4;                   // stdout/stderr от запущенного процесса
    ProcessExit process_exit = 5;       // процесс завершился (exit_code + signal)
    AcknowledgeLazyDeathRequest lazy_death = 6;
  }
}

// ProcessStarted — lord сообщает что процесс успешно запущен.
message ProcessStarted {
  string process_id = 1;
  int32  local_pid = 2;
  google.protobuf.Timestamp at = 3;
}

// ProcessIo — IO chunk с привязкой к process_id.
message ProcessIo {
  string process_id = 1;
  IOChunk chunk = 2;
}

// LordEvent — то что scheduler шлёт lord'у в Connect stream.
message LordEvent {
  oneof event {
    RegisterResponse register_ack = 1;  // ack на Register
    HeartbeatResponse heartbeat_ack = 2;
    SpawnRequest spawn = 3;             // запустить процесс
    KillRequest kill = 4;               // послать сигнал
    FilePushRequest file_push = 7;      // file transfer (Phase 4+)
    AcknowledgeLazyDeathResponse lazy_death_ack = 8;
  }
}

// ProcessExit — lord сообщает что процесс завершился.
message ProcessExit {
  string process_id = 1;
  int32  exit_code = 2;       // -1 если killed by signal
  int32  exit_signal = 3;     // 0 если normal exit
  int64  cpu_usage_usec = 4;
  int64  mem_peak_bytes = 5;
}


message AcknowledgeLazyDeathRequest {
  string lord_id = 1;
  int32 grace_period_sec = 2;
}

message AcknowledgeLazyDeathResponse {
  bool ack = 1;
  int32 drain_timeout_sec = 2;
}
